title: Hero
description: The opening band — rating, headline, supporting copy, two actions, the photo marquee, and the partner-logo strip
fields:
    rating:
        type: text
        label: Rating line
        description: The short line next to the five stars.
        default: "Rated 4.9/5 by client teams"
    headingStart:
        type: text
        label: Heading
        default: "AI consulting that"
    headingAccent:
        type: text
        label: Heading accent
        description: Rendered in italics at the end of the heading.
        default: "earns its keep"
    body:
        type: textarea
        label: Supporting copy
        default: "Lumen helps support and operations teams put AI to work — one measured pilot at a time. No moonshots, no jargon, and a human in the loop wherever it matters."
    buttonText:
        type: text
        label: Primary button text
        default: "Book a call"
    buttonLink:
        type: url
        label: Primary button link
        default: "mailto:hello@example.com"
    secondaryText:
        type: text
        label: Secondary link text
        default: "See how it works"
    secondaryLink:
        type: url
        label: Secondary link
        default: "#process"
    photoOne:
        type: image
        label: Marquee photo 1 (left column)
        default: "https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=800&auto=format&fit=crop"
    photoTwo:
